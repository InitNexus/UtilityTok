<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error</title>
<link rel="icon" type="image/png" href="https://initnexus.github.io/Core/media/branding/logo.png">
<link id="nb-theme-stylesheet" rel="stylesheet" href="https://initnexus.github.io/Core/styling/themes/midnight.css">
<link rel="stylesheet" href="https://initnexus.github.io/Core/styling/core.css">
<style>
.status-page {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--spacing-4);
}

.status-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: 100%;
  max-width: 420px;
  box-sizing: border-box;
  padding: var(--spacing-8) var(--spacing-6);
  border: 1px solid var(--color-border);
  border-radius: 10px;
}

.status-icon {
  margin-bottom: var(--spacing-4);
}

.status-title {
  font-weight: bold;
  font-size: var(--text-lg);
}

.status-text {
  margin-top: var(--spacing-2);
  color: var(--color-text-secondary);
  font-size: var(--text-sm);
}

.status-button {
  margin-top: var(--spacing-6);
}

@media (max-width: 640px) {
  .status-body {
    padding: var(--spacing-6) var(--spacing-4);
  }
}
</style>
</head>
<body class="flex flex-col min-h-dvh">

<div class="status-page">
  <div class="status-body">
    <img class="icon icon-xl status-icon" src="https://initnexus.github.io/Core/media/icons/information.png" alt="">
    <span class="status-title">There was an error</span>
    <span class="status-text">Please try again or come back soon.</span>
    <button class="btn btn-primary status-button" onclick="window.location.href='https://initnexus.github.io/UtilityTok/main/home.html'">Home page</button>
  </div>
</div>

<script src="https://initnexus.github.io/Core/scripts/core.js"></script>

</body>
</html>
