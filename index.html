<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Please Wait</title>
  <link rel="stylesheet" href="https://initnexus.github.io/Core/styling/core.css">
  <link id="nb-theme-stylesheet" rel="stylesheet" href="https://initnexus.github.io/Core/styling/themes/dark.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body {
      background: radial-gradient(ellipse at 50% 60%, rgba(100, 60, 180, 0.18) 0%, transparent 70%),
                  linear-gradient(160deg, #111116 0%, #1a1420 50%, #0f0f14 100%);
      background-color: #111116;
      min-height: 100dvh;
    }
    .preloader-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-5);
    }
    .spinner-ring {
      position: relative;
      width: 120px;
      height: 120px;
      flex-shrink: 0;
    }
    .spinner-ring .spinner {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-width: 3px;
      border-style: solid;
      border-color: rgba(255, 255, 255, 0.12);
      border-top-color: #9b7fe8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-ring-avatar {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #22222c;
    }
    .spinner-ring-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .preloader-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-2);
      text-align: center;
    }
    .preloader-text h3 {
      color: #ffffff;
    }
    .preloader-text p {
      color: #ffffff;
    }
    .preloader-footer {
      position: fixed;
      bottom: var(--spacing-8);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
    }
    .security-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-2) var(--spacing-4);
      background-color: #22222c;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 10px;
      font-size: var(--text-sm);
      color: #ffffff;
      width: fit-content;
    }
    .security-pill a {
      color: #9b7fe8;
      text-decoration: none;
      font-weight: var(--weight-medium);
      transition: color var(--transition-fast);
    }
    .security-pill a:hover {
      color: #b09af0;
    }
  </style>
</head>
<body>
  <div class="preloader-wrapper">
    <div class="spinner-ring">
      <div class="spinner"></div>
      <div class="spinner-ring-avatar">
        <img src="https://initnexus.github.io/Core/media/branding/logo.png" alt="Logo">
      </div>
    </div>
    <div class="preloader-text">
      <h3>Please wait</h3>
      <p>We need to verify you're human...</p>
    </div>
  </div>
  <div class="preloader-footer">
    <div class="security-pill">
      <span>Secured by</span>
      <a href="https://github.com/initnexus" target="_blank" rel="noopener noreferrer">NexusByte Initiative</a>
    </div>
  </div>
  <script src="https://initnexus.github.io/Core/scripts/core.js"></script>
  <script>
    setTimeout(() => {
      window.location.href = 'https://initnexus.github.io/UtilityTok/main/home.html';
    }, 3000);
  </script>
</body>
</html>
