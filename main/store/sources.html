<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UtilityTok Sources</title>
<link rel="icon" type="image/png" href="https://initnexus.github.io/Core/media/branding/logo.png">
<link id="nb-theme-stylesheet" rel="stylesheet" href="https://initnexus.github.io/Core/styling/themes/midnight.css">
<link rel="stylesheet" href="https://initnexus.github.io/Core/styling/core.css">
<style>
.nav-center {
  display: flex;
  align-items: center;
  gap: 24px;
}

@media (min-width: 641px) {
  .nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
}

@media (max-width: 640px) {
  .navbar-brand {
    display: none;
  }
}

@media (max-width: 640px) {
  footer.border-t {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  footer.border-t .cluster {
    margin-top: var(--spacing-3);
  }
}

#menu-sheet,
#shop-sheet {
  border-radius: 10px 10px 0 0;
  min-height: 280px;
  transition: transform 350ms ease-out;
}

html {
  scroll-behavior: smooth;
}

body {
  -webkit-overflow-scrolling: touch;
}

* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

*:focus {
  outline: none;
}

a, button, .icon-container, .menu-row {
  transition: background-color 200ms ease, transform 200ms ease, opacity 200ms ease;
}

.nav-center a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 10px;
}

.nav-center a:hover {
  background-color: var(--color-surface-raised);
}

.navbar-actions .icon-container:hover {
  background-color: var(--color-surface-hover);
}

.menu-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 16px;
  box-sizing: border-box;
  padding: 12px 16px;
  text-decoration: none;
  color: inherit;
  transition: background-color 150ms ease;
}

.menu-section .menu-row {
  margin: 0;
}

.menu-row:hover {
  background-color: var(--color-surface-raised);
  border-radius: 10px;
}

.menu-row .row-chevron {
  margin-left: auto;
}

.menu-section {
  background-color: var(--color-bg);
  border-radius: 10px;
  margin: 0 8px 16px 8px;
  padding: 12px 8px;
}
</style>
</head>
<body class="flex flex-col min-h-dvh">
<nav class="navbar" style="position: relative;">
  <a href="https://initnexus.github.io/UtilityTok" class="navbar-brand">UtilityTok</a>
  <div class="nav-center">
    <a href="https://initnexus.github.io/UtilityTok/main/home.html">

    <a href="https://initnexus.github.io/UtilityTok/main/search.html">

    <a href="javascript:void(0)" data-sheet-open="menu-sheet">

  <div class="navbar-actions">

</nav>

<script>
document.addEventListener('click', function (e) {
  var overlay = document.getElementById('sheet-blur-overlay');
  if (e.target.closest('[data-sheet-open]')) {
    overlay.style.opacity = '1';
    overlay.style.pointerEvents = 'auto';
  } else if (e.target.closest('[data-sheet-close]') || e.target === overlay) {
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    document.querySelectorAll('.sheet.open').forEach(function (s) {
      s.classList.remove('open');
    });
  }
});
</script>
